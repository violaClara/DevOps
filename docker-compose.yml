services:
  python-service:
    build: ./python-service
    ports:
      - "8000:8000"
    env_file:
      - ./python-service/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-app:
    build: ./web-app
    ports:
      - "3000:3000"
    env_file:
      - ./web-app/.env.local
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8000
    depends_on:
      - python-service
    restart: unless-stopped
