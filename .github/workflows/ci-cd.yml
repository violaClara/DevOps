name: CI/CD Pipeline (test and build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run Python service tests
  # ──────────────────────────────────────────────
  test-python:
    name:  Test Python Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: python-service/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENROUTER_API_KEY: test_key_for_ci
        run: pytest test_main.py -v

  # ──────────────────────────────────────────────
  # Job 2: Lint & build check for Next.js web app
  # ──────────────────────────────────────────────
  test-web:
    name:  Test Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build check
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: test@test.iam.gserviceaccount.com
          GOOGLE_PRIVATE_KEY: test_key
          GOOGLE_SHEET_ID: test_sheet_id
          PYTHON_SERVICE_URL: http://localhost:8000
        run: npm run build

  # ──────────────────────────────────────────────
  # Job 3: Build & push Docker images to Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name:  Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-python, test-web]
    # Only push on main branch (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # ── Build & Push Python Service ──
      - name: Build & push python-service
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-python-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-python-service:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-python-service:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Web App ──
      - name: Build & push web-app
        uses: docker/build-push-action@v6
        with:
          context: ./web-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-web-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-web-app:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ocrapp-web-app:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
