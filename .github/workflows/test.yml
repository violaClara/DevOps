name: Full Stack CI/CD Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      working-directory: ./python-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install poppler for pdf2image
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils
        
    - name: Test Python service with pytest
      working-directory: ./python-service
      run: |
        pytest -v

  webapp-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: 'web-app/package-lock.json'

    - name: Install dependencies
      working-directory: ./web-app
      run: npm ci

    - name: Run ESLint
      working-directory: ./web-app
      run: npm run lint

    - name: Build Web App
      working-directory: ./web-app
      run: npm run build
